<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Practice Async</h1>
    <button id="stop">Stop</button>
</body>
<script>
    const log = function(){
        console.log("Lorem Ipsum")
    }
    const ChangeHead = function(){
        document.querySelector('h1').innerHTML = 'Ipsum Lorem'
    }

    setTimeout(log,2000)
    const StopChange = setTimeout(ChangeHead,2000)

    const Button = document.querySelector('#stop')
    Button.addEventListener('click', function (e) {
        clearTimeout(StopChange)
        alert("Heading change prevented")
    })
</script>
</html>
